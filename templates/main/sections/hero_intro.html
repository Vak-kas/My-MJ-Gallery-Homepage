{% load static %}
<section data-section="hero" class="hero-intro" aria-label="Intro">
    <nav class="hero-social" aria-label="소셜 링크">
        <a
            href="https://github.com/Vak-kas"
            class="hero-social-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub"
        >
            <img src="{% static 'images/hero-svg/github.svg' %}" width="44" height="44" alt="" decoding="async">
        </a>
        <button
            type="button"
            class="hero-social-link hero-social-link--copy"
            data-copy="hey_minj@naver.com"
            aria-label="이메일 복사: hey_minj@naver.com"
        >
            <img src="{% static 'images/hero-svg/mail.svg' %}" width="44" height="44" alt="" decoding="async">
        </button>
    </nav>
    <p class="hero-copy-toast" id="hero-copy-toast" role="status" aria-live="polite" hidden>이메일이 복사되었습니다</p>

    <div class="hero-intro-content">
        <div class="hero-logo-slot">
            {% include "components/smj_logo.svg.html" %}
        </div>
        <div class="hero-title-group">
            {% include "components/hero_arrow.svg.html" %}
            <p class="hero-title">서민재 갤러리</p>
            <p class="hero-subtitle" aria-label="SMJ GALLERY">SMJ GALLERY</p>
            <p class="hero-scroll-hint">위로 스크롤 하세요</p>
        </div>
    </div>
</section>
