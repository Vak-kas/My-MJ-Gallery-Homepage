{% if skill_sections %}
<section data-section="skill" class="page-section skill-section mx-auto mt-28 max-w-[1320px] pb-20">
    <div class="reveal mb-10">
        <p class="text-[12px] uppercase tracking-[0.24em] text-[#0066cc]">MJGALLERY / TECH STACK</p>
        <h2 class="apple-display mt-3 text-[52px] font-semibold leading-[1.04] tracking-[-0.04em]">Skills.</h2>
    </div>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        {% for section in skill_sections %}
        {% if section.total > 0 %}
        <article class="reveal rounded-[28px] border border-black/10 bg-white p-6 transition duration-300 hover:-translate-y-1 hover:border-[#0066cc]/20">
            <div class="mb-5 flex items-start justify-between gap-3">
                <div>
                    <p class="text-[11px] uppercase tracking-[0.2em] text-[#0066cc]">{{ section.icon }} {{ section.title }}</p>
                </div>
                <span class="rounded-full bg-[#f5f5f7] px-3 py-1 text-[12px] text-[#6e6e73]">{{ section.total }}</span>
            </div>

            <div class="flex flex-wrap gap-2.5">
                {% for item in section.items %}
                <span class="inline-flex items-center gap-1.5 rounded-[10px] border border-black/[0.1] bg-[#fafafa] px-3 py-1.5 text-[14px] font-medium text-[#1d1d1f]">
                    <span class="h-2 w-2 rounded-full bg-[#3b82f6]"></span>
                    {{ item.name }}
                </span>
                {% endfor %}
            </div>
        </article>
        {% endif %}
        {% endfor %}
    </div>
</section>
{% endif %}
