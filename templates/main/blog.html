{% extends "base.html" %}

{% block content %}
<header class="sticky top-0 z-40 border-b border-black/[0.08] bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-[1320px] items-center justify-between px-6 py-3">
        <a href="{% url 'main:home' %}" class="text-[15px] font-semibold text-[#1d1d1f]">MJ GALLERY</a>
        <nav class="flex items-center gap-2">
            <a href="{% url 'main:home' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Home</a>
            <a href="{% url 'main:blog' %}" class="rounded-full bg-[#0066cc] px-4 py-1.5 text-[13px] font-semibold text-white">Tech Blog</a>
            <a href="{% url 'main:board' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Board</a>
            <a href="{% url 'main:diary' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Diary</a>

            {% if user.is_authenticated %}
                {% if user.is_superuser %}
                <a href="{% url 'studio:index' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Studio</a>
                {% endif %}
                <a href="{% url 'accounts:logout' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Logout</a>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="rounded-full border border-black/[0.1] px-4 py-1.5 text-[13px] text-[#1d1d1f] hover:bg-[#f5f5f7]">Login</a>
            {% endif %}
        </nav>
    </div>
</header>

<main class="mx-auto max-w-[1320px] px-6 py-16">
    <p class="text-[12px] uppercase tracking-[0.24em] text-[#0066cc]">CONTENT / TECH BLOG</p>
    <h1 class="apple-display mt-4 text-[56px] font-semibold tracking-[-0.04em]">Tech Blog.</h1>
    <p class="mt-4 text-[18px] text-[#6e6e73]">기술 아티클과 트러블슈팅 포스트가 표시될 페이지입니다.</p>
</main>
{% endblock %}
