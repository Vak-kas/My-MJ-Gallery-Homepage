{% extends "base.html" %}

{% block content %}
<div class="fixed right-5 top-5 z-50">
    <a href="{% url 'studio:index' %}" class="rounded-full border border-black/10 bg-white/80 px-4 py-2 text-[13px] text-[#1d1d1f] backdrop-blur transition hover:bg-white">
        Studio
    </a>
</div>

<div id="section-flash" class="section-flash"></div>

<main class="scroll-snap-main bg-[#f5f5f7] px-6 py-10 md:px-12 lg:px-24">
    {% include "main/sections/profile.html" %}
    {% include "main/sections/career.html" %}
    {% include "main/sections/activity.html" %}
    


    
</main>

<style>
    html {
        scroll-behavior: smooth;
    }

    .scroll-snap-main {
        scroll-padding-top: 0;
    }

    :root {
        --career-progress: 0;
        --activity-progress: 0;
    }

    .section-flash {
        position: fixed;
        inset: 0;
        z-index: 40;
        pointer-events: none;
        opacity: 0;
        background:
            radial-gradient(1000px 300px at 50% 30%, rgba(59, 130, 246, 0.18), transparent 70%),
            linear-gradient(180deg, rgba(255,255,255,0.55), rgba(245,245,247,0.08));
        mix-blend-mode: screen;
    }

    .section-flash.run {
        animation: sectionFlash .7s cubic-bezier(.22,.61,.36,1);
    }

    @keyframes sectionFlash {
        0% { opacity: 0; }
        28% { opacity: .45; }
        100% { opacity: 0; }
    }

    .page-section {
        transition: opacity .55s ease, transform .65s cubic-bezier(.22,.61,.36,1), filter .65s ease;
        will-change: opacity, transform, filter;
    }

    .profile-section {
        opacity: calc(1 - (var(--career-progress) * 0.86));
        filter: blur(calc(var(--career-progress) * 10px));
        transform: translateY(calc(var(--career-progress) * -42px)) scale(calc(1 - (var(--career-progress) * 0.035)));
    }

    .career-section {
        opacity: calc((0.22 + (var(--career-progress) * 0.78)) * (1 - (var(--activity-progress) * 0.82)));
        filter: blur(calc(((1 - var(--career-progress)) * 10px) + (var(--activity-progress) * 8px)));
        transform: translateY(calc(((1 - var(--career-progress)) * 56px) + (var(--activity-progress) * -36px))) scale(calc((0.965 + (var(--career-progress) * 0.035)) - (var(--activity-progress) * 0.03)));
    }

    .activity-section {
        opacity: calc(0.18 + (var(--activity-progress) * 0.82));
        filter: blur(calc((1 - var(--activity-progress)) * 10px));
        transform: translateY(calc((1 - var(--activity-progress)) * 56px)) scale(calc(0.965 + (var(--activity-progress) * 0.035)));
    }

    html.focus-career .profile-section {
        filter: blur(10px);
        transform: translateY(-72px) scale(.95);
    }

    html.focus-career .career-section {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
    }

    html.focus-activity .career-section {
        filter: blur(10px);
        transform: translateY(-64px) scale(.96);
    }

    html.focus-activity .activity-section {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
    }

    .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity .7s ease, transform .8s ease;
    }

    .reveal.is-active {
        opacity: 1;
        transform: translateY(0);
    }

    .hero-photo {
        transform: scale(1.02);
        transition: transform .25s linear;
    }

    .career-grid {
        columns: 1;
        column-gap: 2.5rem;
    }

    @media (min-width: 768px) {
        .career-grid {
            columns: 2;
        }
    }

    .career-card {
        break-inside: avoid;
        margin-bottom: 2.5rem;
    }
</style>

<script>
    const rootEl = document.documentElement;
    const flash = document.getElementById('section-flash');

    const sections = {
        profile: document.querySelector('.profile-section'),
        career: document.querySelector('.career-section'),
        activity: document.querySelector('.activity-section'),
    };

    const transitionConfig = {
        startRatio: 0.82,
        endRatio: 0.22,
        focusThreshold: 0.9,
    };

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    const calculateSectionProgress = (sectionEl) => {
        if (!sectionEl) return 0;
        const vh = window.innerHeight;
        const rect = sectionEl.getBoundingClientRect();
        const start = vh * transitionConfig.startRatio;
        const end = vh * transitionConfig.endRatio;
        return clamp((start - rect.top) / (start - end), 0, 1);
    };

    const playFlash = () => {
        if (!flash) return;
        flash.classList.remove('run');
        void flash.offsetWidth;
        flash.classList.add('run');
    };

    let prevFocusCareer = false;
    let prevFocusActivity = false;

    const updateSectionTransitions = () => {
        const careerProgress = calculateSectionProgress(sections.career);
        const activityProgress = calculateSectionProgress(sections.activity);

        rootEl.style.setProperty('--career-progress', careerProgress.toFixed(3));
        rootEl.style.setProperty('--activity-progress', activityProgress.toFixed(3));

        const focusActivity = activityProgress > transitionConfig.focusThreshold;
        const focusCareer = careerProgress > transitionConfig.focusThreshold && activityProgress < 0.55;

        rootEl.classList.toggle('focus-career', focusCareer);
        rootEl.classList.toggle('focus-activity', focusActivity);

        if (prevFocusCareer !== focusCareer || prevFocusActivity !== focusActivity) {
            playFlash();
            prevFocusCareer = focusCareer;
            prevFocusActivity = focusActivity;
        }
    };

    updateSectionTransitions();
    window.addEventListener('scroll', updateSectionTransitions, { passive: true });
    window.addEventListener('resize', updateSectionTransitions);

    const reveals = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-active');
            }
        });
    }, { threshold: 0.15 });

    reveals.forEach((el) => io.observe(el));

    const hero = document.querySelector('.hero-photo');
    window.addEventListener('scroll', () => {
        if (!hero) return;
        const y = Math.min(window.scrollY * 0.035, 14);
        hero.style.transform = `translateY(${y}px) scale(1.02)`;
    });

    // 섹션 자동 snap 보정: 경계 영역에서만 snap (threshold 범위 내)
    let scrollEndTimer;
    const SNAP_THRESHOLD = 200;
    
    window.addEventListener('scroll', () => {
        clearTimeout(scrollEndTimer);
        scrollEndTimer = setTimeout(() => {
            const sections = Array.from(document.querySelectorAll('[data-section]'));
            const currentScrollY = window.scrollY;
            
            if (currentScrollY < 50) return;
            
            let closestSection = null;
            let closestDistance = Infinity;
            
            sections.forEach((section) => {
                const sectionTop = section.offsetTop;
                const distance = Math.abs(currentScrollY - sectionTop);
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestSection = section;
                }
            });
            
            if (!closestSection) return;
            
            const closestSectionTop = closestSection.offsetTop;
            
            if (currentScrollY > closestSectionTop) return;
            
            if (closestDistance < SNAP_THRESHOLD) {
                window.scrollTo({ top: closestSectionTop, behavior: 'smooth' });
            }
        }, 150);
    }, { passive: true });
</script>
{% endblock %}
